name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Install Leiningen
      run: |
        curl -L https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o /tmp/lein
        chmod +x /tmp/lein
        mkdir -p ~/.lein
        /tmp/lein self-install
    
    - name: Install clj-kondo
      run: |
        curl -sLO https://github.com/clj-kondo/clj-kondo/releases/download/v2024.09.19/clj-kondo-2024.09.19-linux-static.zip
        unzip -q clj-kondo-2024.09.19-linux-static.zip
        chmod +x clj-kondo
        mv clj-kondo /usr/local/bin/
    
    - name: Run clj-kondo linting
      run: clj-kondo --lint src test
      continue-on-error: true
    
    - name: Run tests with coverage
      run: lein cloverage --output coverage
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/codecov.json
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
